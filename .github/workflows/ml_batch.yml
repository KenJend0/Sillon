name: ML Batch Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  compute:
    name: Compute vectors + recommendations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Step 1 — Compute user taste vectors & cosine similarity
        run: python ml/scripts/compute_user_vectors.py

      - name: Step 2 — Backfill genres (albums sans données genre)
        run: python ml/scripts/backfill_genres.py --limit 200

      - name: Step 3 — Compute recommendations (cosine CF)
        run: python ml/scripts/compute_recommendations.py --method cosine_cf

  evaluate:
    name: Evaluate metrics
    runs-on: ubuntu-latest
    needs: compute          # run after compute succeeds
    timeout-minutes: 15
    # Only evaluate on schedule (not every manual trigger, to avoid spam)
    if: github.event_name == 'schedule'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Evaluate Precision@K, Recall@K, NDCG@K
        run: python ml/scripts/evaluate_metrics.py --method cosine_cf --k 5,10,20
