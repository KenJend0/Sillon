services:
  db:
    image: postgres:16-alpine
    container_name: musicbox-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musicbox}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-musicbox}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: musicbox-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    container_name: musicbox-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: musicbox-api
    env_file:
      - .env
    environment:
      # supprime cette ligne si elle existe encore :
      # DATABASE_URL: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@db:5432/$(POSTGRES_DB)
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db_data:
